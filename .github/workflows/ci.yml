name: Publish

on:
  push:
    branches:
      - main
  schedule:
    - cron: "13 4 * * 0"  # every Sunday at 4:13 UTC   https://crontab.guru/#13_4_*_*_0

permissions:
  contents: read
  packages: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Shellcheck
        run: "shellcheck -- *.sh"

      - uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: Dockerfile

  build-general:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build general-purpose container
        run: make general

      - name: Publish
        uses: thermondo/gce-docker-push-action@a51e08b0f3c379d26d65e327ce0271aa21ecd50c
        with:
          username: ${{ github.repository_owner }}
          creds: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          image: ghcr.io/thermondo/sigsci

  build-python:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build Python container
        run: make python
        env:
          PYTHON_VERSION: ${{ matrix.version }}

      - name: Publish
        uses: thermondo/gce-docker-push-action@a51e08b0f3c379d26d65e327ce0271aa21ecd50c
        with:
          username: ${{ github.repository_owner }}
          creds: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          image: ghcr.io/thermondo/sigsci

  build-java:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        version:
          - "21"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build Java container
        run: make java
        env:
          JAVA_VERSION: ${{ matrix.version }}

      - name: Publish
        uses: thermondo/gce-docker-push-action@a51e08b0f3c379d26d65e327ce0271aa21ecd50c
        with:
          username: ${{ github.repository_owner }}
          creds: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          image: ghcr.io/thermondo/sigsci
